context:
  name: cql2
  version: "0.5.4"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/cql2-${{ version }}.tar.gz
  sha256: c0cc41880f20b5c464a80bc9dbd048409a00d3a8d173e2da8e26bd79a7348f5e

build:
  number: 0
  python:
    entry_points:
      - cql2 = cql2:main
    version_independent: true
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - if: build_platform != host_platform
      then:
        - python ${{ python_min }}.*
        - cross-python_${{ host_platform }}
        - crossenv
        - maturin >=1.7,<2.0
    - ${{ stdlib("c") }}
    - ${{ compiler("rust") }}
    - cargo-bundle-licenses
  host:
    - python ${{ python_min }}.*
    - python-abi3
    - maturin >=1.7,<2.0
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - cql2
      pip_check: true
      python_version: ["${{ python_min ~ '.*' }}"]
  - requirements:
      run:
        - pip
        - abi3audit
    script:
      - cql2 --help
      - if: unix
        then:
          - export SP_DIR=$(python -c "import site; print(site.getsitepackages()[0])")
          - abi3audit $SP_DIR/cql2/cql2.abi3.so -s -v --assume-minimum-abi3 ${{ python_min }}
      - if: win
        then:
          - set "SP_DIR=%PREFIX%\\Lib\\site-packages"
          - abi3audit %SP_DIR%\\cql2\\cql2.pyd -s -v --assume-minimum-abi3 ${{ python_min }}

about:
  homepage: https://developmentseed.org/cql2-rs
  repository: https://github.com/developmentseed/cql2-rs
  summary: Parse, validate, and convert Common Query Language (CQL2) text and JSON
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml

extra:
  recipe-maintainers:
    - gadomski
